<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMod — Releases</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <meta property="og:image" content="https://oramicgit.github.io/XMod-repo/favicon.svg"
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #1e1e1e;
            --accent: #e0ff4f;
            --accent-dim: rgba(224, 255, 79, 0.12);
            --text: #e8e8e8;
            --text-muted: #555;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 680px;
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 56px;
            animation: fadeUp 0.6s ease both;
        }

        .logo {
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h1 {
            font-size: clamp(42px, 8vw, 72px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--text);
        }

        h1 span { color: var(--accent); }

        .tagline {
            margin-top: 12px;
            font-size: 14px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 28px 32px;
            margin-bottom: 12px;
            animation: fadeUp 0.6s ease both;
        }

        .card-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .release-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .release-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .release-body {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .assets {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .asset-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 3px;
            padding: 14px 24px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
            letter-spacing: 0.02em;
        }

        .asset-btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .asset-btn:active { transform: translateY(0); }

        .asset-size {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 400;
            opacity: 0.6;
        }

        .latest-badge {
            display: inline-block;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 2px 8px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .loading {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            padding: 40px 0;
            animation: fadeUp 0.6s ease both;
        }

        .error {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: #ff4f4f;
            text-align: center;
            padding: 20px 0;
        }

        footer {
            margin-top: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            animation: fadeUp 0.6s 0.4s ease both;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
        }

        footer a:hover { color: var(--accent); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">// oramicgit.github.io/XMod-repo</div>
            <h1>X<span>Mod</span></h1>
            <p class="tagline">sandbox game made using Unity 2022.3</p>
        </header>

        <div id="releases">
            <div class="loading">Loading releases...</div>
        </div>

        <footer>
            XMod by OramiX · <a href="https://github.com/OramicGIT/XMod-repo">GitHub</a> · <a href="https://oramix.itch.io/xmod">itch.io</a>
        </footer>
    </div>

    <script>
        const REPO = 'OramicGIT/XMod-repo';

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function formatSize(bytes) {
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        async function loadReleases() {
            const container = document.getElementById('releases');
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/releases`);
                if (!res.ok) throw new Error('Failed to fetch releases');
                const releases = await res.json();

                if (releases.length === 0) {
                    container.innerHTML = '<div class="loading">No releases yet.</div>';
                    return;
                }

                container.innerHTML = '';

                releases.forEach((release, i) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = (i * 0.1) + 's';

                    const assets = release.assets.map(asset => `
                        <a class="asset-btn" href="${asset.browser_download_url}" download>
                            <span>${asset.name}</span>
                            <span class="asset-size">${formatSize(asset.size)} ↓</span>
                        </a>
                    `).join('');

                    const body = release.body
                        ? `<div class="release-body">${release.body.trim()}</div>`
                        : '';

                    card.innerHTML = `
                        <div class="card-label">Release</div>
                        <div class="release-name">
                            ${release.name || release.tag_name}
                            ${i === 0 ? '<span class="latest-badge">Latest</span>' : ''}
                        </div>
                        <div class="release-date">${formatDate(release.published_at)}</div>
                        ${body}
                        <div class="assets">
                            ${assets || '<div style="font-size:13px;color:var(--text-muted)">No downloadable assets.</div>'}
                        </div>
                    `;

                    container.appendChild(card);
                });

            } catch (e) {
                container.innerHTML = `<div class="error">Failed to load releases: ${e.message}</div>`;
            }
        }

        loadReleases();
    </script>
</body>
</html>
