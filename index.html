<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>XMod</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <meta name="description" content="XMod — fun sandbox game ">
    <meta name="theme-color" content="#0a0a0a">
    <meta property="og:title" content="XMod">
    <meta property="og:description" content="XMod - fun sandbox game">
    <meta property="og:url" content="https://oramicgit.github.io/XMod-repo/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://oramicgit.github.io/XMod-repo/favicon.svg"
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #1e1e1e;
            --accent: #e0ff4f;
            --accent-dim: rgba(224, 255, 79, 0.12);
            --text: #e8e8e8;
            --text-muted: #555;
            --online: #4fff91;
            --offline: #ff4f4f;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 680px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            margin-bottom: 56px;
            animation: fadeUp 0.6s ease both;
        }

        .logo {
            font-size: 13px;
            font-family: 'Syne', monospace;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h1 {
            font-size: clamp(42px, 8vw, 72px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--text);
        }

        h1 span {
            color: var(--accent);
        }

        .tagline {
            margin-top: 12px;
            font-size: 14px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 28px 32px;
            margin-bottom: 12px;
            animation: fadeUp 0.6s ease both;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }

        .card-label {
            font-family: 'Syne', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        /* Download button */
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 3px;
            padding: 16px 24px;
            margin-bottom: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
            letter-spacing: 0.02em;
        }

        .mods-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 3px;
            padding: 16px 24px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
            letter-spacing: 0.02em;
        }

        .download-btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .mods-btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .mods-btn:active {
            transform: translateY(0);
        }

        .download-arrow {
            font-size: 18px;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            animation: fadeUp 0.6s 0.4s ease both;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">// oramicgit.github.io/XMod-repo</div>
            <h1>X<span>Mod</span></h1>
            <div class="tagline">sandbox game made using Unity 2022.3</div>
        </header>

        <!-- Download -->
        <div class="card">
            <div class="card-label">Get the game</div>
            <a class="download-btn" href="https://oramix.itch.io/xmod" target="_blank">
                Download XMod on itch.io
                <span class="download-arrow">↗</span>
            </a>
           <a class="mods-btn" href="https://github.com/OramicGIT/XMod-repo/releases" target="_blank">
                or get mods
            </a>
        </div>

        <footer>
            XMod by OramiX &nbsp;·&nbsp; <span id="year"></span>
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
